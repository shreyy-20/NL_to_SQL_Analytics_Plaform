services:
  - type: web
    name: krishiquery-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/setup_database.py && python scripts/seed_data.py && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.20
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: krishiquery-db
          property: connectionString
      - key: API_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: logs/krishiquery.log
      - key: ENABLE_VOICE
        value: "false"
      - key: ENABLE_IVR
        value: "false"
      - key: ALLOWED_HOSTS
        value: '["localhost","127.0.0.1","*.onrender.com"]'
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: krishiquery-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: krishiquery-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: krishiquery-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: krishiquery-db
    plan: free
    databaseName: krishiquery
    user: krishiquery_user
